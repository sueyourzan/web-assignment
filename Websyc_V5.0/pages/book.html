<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教材</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/book.css">
</head>
<body>
    <h1 class="page-title">📚 课程教材</h1>

    <div class="book-grid">
        <!-- 计算机组成原理 -->
        <div class="course-card">
            <h3><span class="icon">💻</span> 计算机组成原理</h3>

            <div class="section-label">📖 教材</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/computer.jpg" alt="计算机组成原理教材">
                    <div class="book-img-overlay">主教材</div>
                </div>
            </div>

            <div class="section-label" style="margin-top: 16px;">📚 参考书</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/computer2.jpg" alt="参考书1">
                    <div class="book-img-overlay">参考书1</div>
                </div>
                <div class="book-img-wrapper">
                    <img src="../images/computer3.jpg" alt="参考书2">
                    <div class="book-img-overlay">参考书2</div>
                </div>
            </div>
        </div>

        <!-- Java语言课程设计 -->
        <div class="course-card">
            <h3><span class="icon">☕</span> Java语言课程设计</h3>

            <div class="section-label">📖 教材</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/Java.jpg" alt="Java教材">
                    <div class="book-img-overlay">主教材</div>
                </div>
            </div>
        </div>

        <!-- 数据库原理与应用 -->
        <div class="course-card">
            <h3><span class="icon">🗄️</span> 数据库原理与应用</h3>

            <div class="section-label">📖 教材</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/database.jpg" alt="数据库教材">
                    <div class="book-img-overlay">主教材</div>
                </div>
            </div>
        </div>

        <!-- 离散数学 -->
        <div class="course-card">
            <h3><span class="icon">📐</span> 离散数学</h3>

            <div class="section-label">📖 教材</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/DiscreteMath.jpg" alt="离散数学教材">
                    <div class="book-img-overlay">主教材</div>
                </div>
            </div>
        </div>

        <!-- Web技术基础 -->
        <div class="course-card">
            <h3><span class="icon">🌐</span> Web技术基础</h3>

            <div class="section-label">📖 教材</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/web.jpg" alt="Web教材">
                    <div class="book-img-overlay">主教材</div>
                </div>
            </div>

            <div class="section-label" style="margin-top: 16px;">📚 参考书</div>
            <div class="book-images">
                <div class="book-img-wrapper">
                    <img src="../images/Web2.jpg" alt="Web参考书">
                    <div class="book-img-overlay">参考书</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
