<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web技术基础实验V2.0</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

    <style>
        *
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .header
        {
            text-align: center;
            padding: 15px 0;
            color: blue;
        }
        .nav
        {
            color: blue;
            display: flex;
            text-decoration: underline;
            padding: 5px 0;
            position: sticky;
            top: 0;
            background:url(top-bg.gif) center/cover;
        }
        .nav a
        {
            color: blue;
            text-decoration: none;
            padding: 5px 10px;
            margin: 0 20px;
            transition: all 0.3s ease;
            font-size: 20px;
        }
        .nav a:hover
        {
            color:red;
            font-size: 25px;
            text-decoration: underline;
        }
        .mainFrame
        {
            width: 100%;
            height: 540px;
            border: none;
            overflow: hidden;
            background-color: aquamarine;
        }
        .footer 
        {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            color: #ff69b4;
            padding: 10px 0;
            font-size: 15px;
            background:url(top-bg.gif) center/cover;
        }
    </style>
</head>
<body>
    <a name="top"></a>

    <div class="header">
        <h2>2025-2026学期课程情况</h2>
    </div>

    <div class="nav">
        <a href="introduce.html" target="mainFrame">课程简介</a>
        <a href="schedule.html" target="mainFrame">课表</a>
        <a href="book.html" target="mainFrame">教材</a>
    </div>

    <iframe 
        src="introduce.html"
        name="mainFrame"
        class="mainFrame"
        height="320px"
        width="640px">
    </iframe>

    
    <div class="footer">

    </div>
